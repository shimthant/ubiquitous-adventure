<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamepay Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#020c1b;
color:white;
overflow-x:hidden;
}

#particles-js{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
}

.container{
max-width:900px;
margin:auto;
padding:15px;
}

.header{
text-align:center;
margin-bottom:25px;
}

.header h1{
font-size:36px;
color:#00ffff;
text-shadow:0 0 20px #00ffff;
}

.header p{
color:#9fdfff;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:#041c40;
padding:20px;
border-radius:15px;
text-align:center;
cursor:pointer;
border:1px solid #00ffff40;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 0 20px #00ffff;
}

.card img{
width:60px;
margin-bottom:10px;
}

.panel{
background:#021733;
padding:15px;
border-radius:12px;
margin-bottom:15px;
border:1px solid #00ffff30;
}

.item{
display:flex;
justify-content:space-between;
background:#06306d;
padding:10px;
border-radius:8px;
margin-bottom:8px;
}

.qty button{
background:#00ffff;
border:none;
padding:4px 10px;
border-radius:6px;
cursor:pointer;
}

textarea{
width:100%;
border:none;
border-radius:8px;
padding:10px;
margin-top:10px;
}

.telegram{
width:100%;
margin-top:12px;
background:#00ffff;
color:#021733;
padding:12px;
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
cursor:pointer;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 10px #00ffff;}
to{box-shadow:0 0 25px #00ffff;}
}

.payments{
margin-top:10px;
display:flex;
flex-wrap:wrap;
gap:10px;
}

.payments label{
background:#06306d;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.footer{
text-align:center;
margin-top:20px;
color:#00ffff;
}

</style>
</head>

<body>

<div id="particles-js"></div>

<div class="container">

<div class="header">
<h1>Gamepay Hub</h1>
<p>Mobile Game Topup Store</p>
</div>

<div id="menu" class="grid"></div>

<div id="gamePage" style="display:none">

<div class="panel">

<h2 id="gameTitle"></h2>

<img id="gameImage" style="width:100%;border-radius:10px">

<div id="items"></div>

</div>

<div class="panel">

<h3>Order Cart</h3>

<div id="cart"></div>

<div style="margin-top:8px">
Total Amount: <span id="total">0</span> ks
</div>

<textarea id="account" placeholder="Game ID / Server / Name"></textarea>

<div class="payments">

<label><input type="radio" name="pay" value="Kpay">Kpay</label>
<label><input type="radio" name="pay" value="Wave">Wave</label>
<label><input type="radio" name="pay" value="UAB">UAB</label>
<label><input type="radio" name="pay" value="Binance">Binance</label>
<label><input type="radio" name="pay" value="AyaPay">AyaPay</label>
<label><input type="radio" name="pay" value="WeChat Pay">WeChat</label>

</div>

<button class="telegram" onclick="sendOrder()">🚀 Order via Telegram</button>

</div>

<button onclick="backMenu()">Back</button>

</div>

<div class="footer">
Founder : Diameter Eight
</div>

</div>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<script>

particlesJS("particles-js",{

particles:{
number:{value:80},
color:{value:"#00ffff"},
shape:{type:"circle"},
opacity:{value:0.5},
size:{value:3},

line_linked:{
enable:true,
distance:150,
color:"#00ffff",
opacity:0.4,
width:1
},

move:{
enable:true,
speed:2
}

}

})

</script>
    <script>

const TELEGRAM="angsthtun"

let cart={}
let currentGame=""

let data={

mlbb:{
title:"Mobile Legends",
icon:"https://seeklogo.com/images/M/mobile-legends-logo.png",
icon:"mobile-legends.png",

items:[
{name:"Weekly Pass",price:5700},
{name:"50 Diamonds",price:3100},
{name:"150 Diamonds",price:9000}
]
 },
  genshin:{
    title:"Genshin Impact",
    icon:"https://upload.wikimedia.org/wikipedia/en/0/0d/Genshin_Impact_logo.svg",
    image:"https://images8.alphacoders.com/110/1108096.jpg",
    items:[
      {name:"Blessing",price:13800},
      {name:"60 Genesis Crystal",price:2750},
      {name:"300+30 Genesis Crystal",price:13800},
      {name:"980+110 Genesis Crystal",price:42000},
      {name:"1980+260 Genesis Crystal",price:87250},
      {name:"3280+600 Genesis Crystal",price:143000},
      {name:"6480+1600 Genesis Crystal",price:273000}
    ]
  },

  starrail:{
    title:"Honkai: Star Rail",
    icon:"https://upload.wikimedia.org/wikipedia/en/6/6d/Honkai_Star_Rail_logo.png",
    image:"https://images6.alphacoders.com/131/1318293.jpeg",
    items:[
      {name:"60 Oneiric Shard",price:2800},
      {name:"330 Oneiric Shard",price:14000},
      {name:"1090 Oneiric Shard",price:42500},
      {name:"2240 Oneiric Shard",price:84800},
      {name:"3880 Oneiric Shard",price:144800},
      {name:"8080 Oneiric Shard",price:272800},
      {name:"Express Supply Pass",price:13800}
    ]
  },

  arena:{
    title:"Arena Breakout",
    icon:"https://seeklogo.com/images/A/arena-breakout-logo.png",
    image:"https://images5.alphacoders.com/131/1316943.jpeg",
    items:[
      {name:"66 Bonds",price:3500},
      {name:"335 Bonds",price:17600},
      {name:"675 Bonds",price:35000},
      {name:"1690 Bonds",price:85600},
      {name:"3400 Bonds",price:171200},
      {name:"6820 Bonds",price:329500},
      {name:"Beginner Select",price:2700},
      {name:"Bulletproof Case (30D)",price:8000},
      {name:"Composite Case (30D)",price:24100},
      {name:"Advanced Battle Pass",price:13700},
      {name:"Premium Battle Pass",price:40000}
    ]
  }

}


const menu=document.getElementById("menu")

function renderMenu(){

menu.innerHTML=""

for(let k in data){

let g=data[k]

menu.innerHTML+=`

<div class="card" onclick="openGame('${k}')">

<img src="${g.icon}" onerror="this.src='https://via.placeholder.com/60'">

<div>${g.title}</div>

</div>

`

}

}

function openGame(k){

currentGame=k
menu.style.display="none"
document.getElementById("gamePage").style.display="block"

let g=data[k]

document.getElementById("gameTitle").textContent=g.title
document.getElementById("gameImage").src=g.image

renderItems()

}

function backMenu(){

menu.style.display="grid"
document.getElementById("gamePage").style.display="none"

cart={}
updateCart()

}

function renderItems(){

let box=document.getElementById("items")
box.innerHTML=""

data[currentGame].items.forEach((item,i)=>{

box.innerHTML+=`

<div class="item">

<span>${item.name}</span>

<div class="qty">

<button onclick="changeQty(${i},-1)">-</button>

<span id="q${i}">0</span>

<button onclick="changeQty(${i},1)">+</button>

</div>

<span>${item.price}</span>

</div>

`

})

}

function changeQty(i,v){

cart[i]=(cart[i]||0)+v
if(cart[i]<0)cart[i]=0

document.getElementById("q"+i).textContent=cart[i]

updateCart()

}

function updateCart(){

let html=""
let total=0

for(let i in cart){

if(cart[i]>0){

let item=data[currentGame].items[i]
let price=item.price*cart[i]

total+=price

html+=`${item.name} x${cart[i]} - ${price} ks<br>`

}

}

document.getElementById("cart").innerHTML=html
document.getElementById("total").textContent=total

}

function sendOrder(){

let msg="Gamepay Hub Order\n\n"

msg+="Game: "+data[currentGame].title+"\n\n"

msg+="Selective Items:\n"

for(let i in cart){

if(cart[i]>0){

let item=data[currentGame].items[i]

msg+=item.name+" x"+cart[i]+"\n"

}

}

let account=document.getElementById("account").value

msg+="\nAccount: "+account+"\n"

let pay=document.querySelector('input[name="pay"]:checked')

if(pay){
msg+="Payment: "+pay.value+"\n"
}

let total=document.getElementById("total").textContent

msg+="\nTotal Amount: "+total+" ks\n"

navigator.clipboard.writeText(msg)

window.open("https://t.me/"+TELEGRAM+"?text="+encodeURIComponent(msg))

}

renderMenu()

</script>

</body>
</html>
