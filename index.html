<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gamepay Hub</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #19d8ff, #00bfff, #35cfff);
      color: white;
      min-height: 100vh;
    }

    .container{
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .header{
      background: #082f6b;
      border: 2px solid #031b44;
      border-radius: 24px;
      padding: 28px 16px;
      text-align: center;
      box-shadow: 0 0 18px rgba(0,0,0,0.25);
      margin-bottom: 24px;
    }

    .header h1{
      color: #ffd900;
      font-size: 42px;
      text-shadow: 0 0 8px #ffd900, 0 0 18px #ffd900, 0 0 28px #fff176;
    }

    .header p{
      margin-top: 10px;
      font-size: 24px;
      color: #ffe866;
      text-shadow: 0 0 8px #ffd900;
    }

    .app-grid{
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      margin-bottom: 24px;
    }

    .app-card{
      background: #08397f;
      border: 2px solid #031b44;
      border-radius: 20px;
      padding: 24px 16px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.25s;
      box-shadow: 0 0 14px rgba(0,0,0,0.2);
    }

    .app-card:hover{
      transform: translateY(-4px);
      background: #0a4598;
    }

    .game-page{
      display: none;
      grid-template-columns: 1.5fr 1fr;
      gap: 22px;
      margin-top: 8px;
    }

    .panel{
      background: #082f6b;
      border: 2px solid #031b44;
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 0 16px rgba(0,0,0,0.2);
    }

    .game-title{
      color: #ffd900;
      font-size: 34px;
      text-shadow: 0 0 8px #ffd900;
      margin-bottom: 18px;
    }

    .top-bar{
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .back-btn{
      background: #12d7ff;
      color: #04204e;
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(18,215,255,0.8);
    }

    .preview-box{
      width: 100%;
      border-radius: 18px;
      overflow: hidden;
      background: #0a4598;
      border: 2px solid #031b44;
      margin-bottom: 18px;
    }

    .preview-box img{
      width: 100%;
      display: block;
      max-height: 360px;
      object-fit: cover;
    }

    .section-label{
      color: #bfefff;
      font-size: 18px;
      margin-bottom: 12px;
    }

    .items{
      display: grid;
      gap: 12px;
    }

    .item{
      background: #0a4598;
      border: 1px solid #04204e;
      border-radius: 16px;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .item label{
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      flex: 1;
      min-width: 220px;
      font-size: 18px;
    }

    .item input[type="checkbox"],
    .payment-option input[type="radio"]{
      width: 18px;
      height: 18px;
      accent-color: #12d7ff;
    }

    .price{
      color: #ffe866;
      font-size: 18px;
      font-weight: bold;
    }

    .cart-title{
      color: #ffd900;
      font-size: 30px;
      text-shadow: 0 0 8px #ffd900;
      margin-bottom: 16px;
    }

    .cart-list{
      min-height: 120px;
      background: #0a4598;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 16px;
    }

    .cart-empty{
      color: #d9f8ff;
    }

    .cart-row{
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.14);
      font-size: 15px;
    }

    .cart-row:last-child{
      border-bottom: none;
    }

    .total{
      font-size: 20px;
      color: #ffe866;
      font-weight: bold;
      margin-bottom: 18px;
    }

    .input-label{
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 18px;
    }

    textarea{
      width: 100%;
      min-height: 130px;
      border: none;
      outline: none;
      resize: vertical;
      border-radius: 16px;
      padding: 14px;
      font-size: 16px;
      background: #2ce7ff;
      color: #04204e;
      margin-bottom: 18px;
      box-shadow: 0 0 14px rgba(44,231,255,0.65);
    }

    .payment-box{
      background: #0a4598;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 18px;
    }

    .payment-title{
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 12px;
      color: #ffffff;
    }

    .payment-options{
      display: grid;
      gap: 10px;
    }

    .payment-option{
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 17px;
    }

    .telegram-btn{
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 15px 18px;
      background: #12d7ff;
      color: #04204e;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 14px rgba(18,215,255,0.85);
      transition: 0.25s;
    }

    .telegram-btn:hover{
      transform: translateY(-2px);
    }

    .telegram-id{
      margin-top: 10px;
      text-align: center;
      color: #dffcff;
      font-size: 15px;
    }

    @media (max-width: 900px){
      .game-page{
        grid-template-columns: 1fr;
      }

      .header h1{
        font-size: 34px;
      }

      .header p{
        font-size: 20px;
      }

      .game-title{
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <h1>Gamepay Hub</h1>
      <p>Mobile games Topup</p>
    </div>

    <div id="gameMenu" class="app-grid">
      <div class="app-card" onclick="showGame('mlbb')">MLBB</div>
      <div class="app-card" onclick="showGame('genshin')">Genshin Impact</div>
      <div class="app-card" onclick="showGame('hsr')">Honkai Star Rail</div>
      <div class="app-card" onclick="showGame('zzz')">Zenless Zero Zone</div>
    </div>

    <div id="gamePage" class="game-page">
      <div class="panel">
        <div class="top-bar">
          <div id="gameTitle" class="game-title">Mobile Legends Top up</div>
          <button class="back-btn" onclick="backToMenu()">Back to Games</button>
        </div>

        <div class="preview-box">
          <img id="gameImage" src="" alt="Game Image">
        </div>

        <div class="section-label">Price</div>
        <div id="itemsContainer" class="items"></div>
      </div>

      <div class="panel">
        <div class="cart-title">Order Cart</div>

        <div id="cartList" class="cart-list">
          <div class="cart-empty">No items selected yet.</div>
        </div>

        <div class="total">Total: <span id="totalPrice">0</span> ks</div>

        <label class="input-label" for="accountInfo">Account information</label>
        <textarea id="accountInfo" placeholder="Enter your account information here...
Example:
Game ID:
Server ID:
Name:"></textarea>

        <div class="payment-box">
          <div class="payment-title">Payment method</div>
          <div class="payment-options">
            <label class="payment-option"><input type="radio" name="paymentMethod" value="Kpay"> Kpay</label>
            <label class="payment-option"><input type="radio" name="paymentMethod" value="Wave"> Wave</label>
            <label class="payment-option"><input type="radio" name="paymentMethod" value="UAB"> UAB</label>
            <label class="payment-option"><input type="radio" name="paymentMethod" value="Binance"> Binance</label>
            <label class="payment-option"><input type="radio" name="paymentMethod" value="Aya Pay"> Aya Pay</label>
          </div>
        </div>

        <button class="telegram-btn" onclick="sendTelegramOrder()">Order via Telegram</button>
        <div class="telegram-id">@angsthtun</div>
      </div>
    </div>
  </div>

  <script>
    const gameData = {
      mlbb: {
        title: "Mobile Legends Top up",
        image: "https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=1200&q=80",
        items: [
          { name: "2x💎 50+50", price: 3100 },
          { name: "2x💎 150+150", price: 9000 },
          { name: "2x💎 250+250", price: 14800 },
          { name: "2x💎 500+500", price: 30000 },
          { name: "✉️ Twilight pass", price: 32300 },
          { name: "📆📆📆 3wp+11💎", price: 17900 },
          { name: "📆📆 2wp + 86", price: 16350 },
          { name: "📆 1wp + 172💎", price: 15400 },
          { name: "💎 343", price: 19150 },
          { name: "💎 279", price: 15700 }
        ]
      },
      genshin: {
        title: "GENSHIN IMPACT",
        image: "https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&w=1200&q=80",
        items: [
          { name: "Blessing", price: 13800 },
          { name: "Genesis Crystal 60", price: 2750 },
          { name: "Genesis Crystal 300+30", price: 13800 },
          { name: "Genesis Crystal 980+110", price: 42000 },
          { name: "Genesis Crystal 1989+260", price: 87250 },
          { name: "Genesis Crystal 3280+60", price: 143000 },
          { name: "Genesis Crystal 6489+1600", price: 273000 }
        ]
      },
      hsr: {
        title: "Honkai: Star Rail",
        image: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=1200&q=80",
        items: [
          { name: "60", price: 2800 },
          { name: "330", price: 14000 },
          { name: "1090", price: 42500 },
          { name: "2240", price: 84800 },
          { name: "3880", price: 144800 },
          { name: "8080", price: 272800 },
          { name: "Express Supply", price: 13800 }
        ]
      },
      zzz: {
        title: "Zenless Zero Zone",
        image: "https://images.unsplash.com/photo-1560253023-3ec5d502959f?auto=format&fit=crop&w=1200&q=80",
        items: [
          { name: "Coming Soon", price: 0 }
        ]
      }
    };

    let currentGame = "";

    function showGame(gameKey){
      currentGame = gameKey;

      document.getElementById("gameMenu").style.display = "none";
      document.getElementById("gamePage").style.display = "grid";

      document.getElementById("gameTitle").textContent = gameData[gameKey].title;
      document.getElementById("gameImage").src = gameData[gameKey].image;
      document.getElementById("gameImage").alt = gameData[gameKey].title;

      renderItems();
      clearCart();
    }

    function backToMenu(){
      document.getElementById("gameMenu").style.display = "grid";
      document.getElementById("gamePage").style.display = "none";
      clearCart();
    }

    function renderItems(){
      const container = document.getElementById("itemsContainer");
      const items = gameData[currentGame].items;

      container.innerHTML = "";

      items.forEach((item) => {
        const row = document.createElement("div");
        row.className = "item";

        row.innerHTML = `
          <label>
            <input type="checkbox" class="item-check" data-name="${item.name}" data-price="${item.price}">
            <span>${item.name}</span>
          </label>
          <div class="price">${item.price.toLocaleString()} ks</div>
        `;

        container.appendChild(row);
      });

      document.querySelectorAll(".item-check").forEach(check => {
        check.addEventListener("change", updateCart);
      });
    }

    function updateCart(){
      const checkedItems = document.querySelectorAll(".item-check:checked");
      const cartList = document.getElementById("cartList");
      const totalPrice = document.getElementById("totalPrice");

      if(checkedItems.length === 0){
        cartList.innerHTML = `<div class="cart-empty">No items selected yet.</div>`;
        totalPrice.textContent = "0";
        return;
      }

      let html = "";
      let total = 0;

      checkedItems.forEach(item => {
        const name = item.dataset.name;
        const price = Number(item.dataset.price);
        total += price;

        html += `
          <div class="cart-row">
            <span>${name}</span>
            <span>${price.toLocaleString()} ks</span>
          </div>
        `;
      });

      cartList.innerHTML = html;
      totalPrice.textContent = total.toLocaleString();
    }

    function clearCart(){
      document.getElementById("cartList").innerHTML = `<div class="cart-empty">No items selected yet.</div>`;
      document.getElementById("totalPrice").textContent = "0";
      document.getElementById("accountInfo").value = "";

      const checks = document.querySelectorAll(".item-check");
      checks.forEach(check => check.checked = false);

      const radios = document.querySelectorAll('input[name="paymentMethod"]');
      radios.forEach(radio => radio.checked = false);
    }

    function sendTelegramOrder(){
      const selectedItems = document.querySelectorAll(".item-check:checked");
      const accountInfo = document.getElementById("accountInfo").value.trim();
      const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked');

      if(selectedItems.length === 0){
        alert("Please select at least one item.");
        return;
      }

      if(accountInfo === ""){
        alert("Please fill in account information.");
        return;
      }

      if(!paymentMethod){
        alert("Please select a payment method.");
        return;
      }

      let total = 0;
      let message = "Gamepay Hub Order\n\n";
      message += "Game: " + gameData[currentGame].title + "\n\n";
      message += "Selected Items:\n";

      selectedItems.forEach((item, index) => {
        const name = item.dataset.name;
        const price = Number(item.dataset.price);
        total += price;
        message += (index + 1) + ". " + name + " - " + price + " ks\n";
      });

      message += "\nTotal: " + total + " ks\n";
      message += "Payment Method: " + paymentMethod.value + "\n\n";
      message += "Account Information:\n" + accountInfo;

      const url = "https://t.me/angsthtun?text=" + encodeURIComponent(message);
      window.open(url, "_blank");
    }
  </script>
</body>
</html>
